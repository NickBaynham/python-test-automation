services:
  mongo:
    image: mongo:8
    ports:
      - "${MONGO_PORT:-27100}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      start_period: 30s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3

  sampleapi:
    build: sampleapi
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DATABASE: sampledb
    ports:
      - "${SAMPLEAPI_PORT:-8100}:8100"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health')"
      start_period: 30s
      start_interval: 2s
      interval: 30s
      timeout: 2s
      retries: 3

  sampleapp:
    build: sampleapp
    ports:
      - "${SAMPLEAPP_PORT:-3100}:8080"
    healthcheck:
      # 127.0.0.1, not localhost: Alpine resolves localhost to ::1 first
      # and nginx listens on IPv4 only. Fast probes during startup only;
      # steady-state backs off to 30s.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      start_period: 30s
      start_interval: 2s
      interval: 30s
      timeout: 2s
      retries: 3
